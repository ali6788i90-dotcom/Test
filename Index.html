<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Exchange Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header & Profile Balance -->
        <header>
            <h1>Task Exchange</h1>
            <div class="points-display">
                Available Balance: <span id="user-points">100</span> Points
            </div>
        </header>

        <main class="dashboard">
            <!-- Left Column: Add Task Form -->
            <section class="form-section">
                <h2>Post a New Task</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="task-title">Task Title</label>
                        <input type="text" id="task-title" placeholder="e.g., Review Code, Translate Docs" required>
                    </div>
                    <div class="form-group">
                        <label for="task-desc">Description</label>
                        <textarea id="task-desc" placeholder="Provide clear expectations..." rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="task-reward">Reward (Points)</label>
                        <input type="number" id="task-reward" min="5" max="50" value="10" required>
                    </div>
                    <button type="submit" class="btn-primary">Post to Board</button>
                </form>
            </section>

            <!-- Right Column: Boards Layout -->
            <section class="board-section">
                <!-- Available Tasks -->
                <div class="board-column">
                    <h2>Available Tasks</h2>
                    <div id="available-tasks-list" class="task-list">
                        <!-- Dynamic items get injected here -->
                    </div>
                </div>

                <!-- My Claimed Tasks -->
                <div class="board-column">
                    <h2>My Claimed Tasks</h2>
                    <div id="claimed-tasks-list" class="task-list">
                        <!-- Dynamic items get injected here -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
